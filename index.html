<!DOCTYPE html>
<html>
<head>
    <title>E-commerce Web App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>My E-commerce Store</h1>

    <!-- Login Section -->
    <div id="auth">
        <h2>Login / Signup</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <br><br>
        <button onclick="signup()">Signup</button>
        <button onclick="login()">Login</button>
        <p id="message"></p>
    </div>

    <h2 id="welcome"></h2>

    <!-- Products -->
    <div class="products">
        <div class="product">
            <h3>Shirt</h3>
            <p>₹500</p>
            <button onclick="addToCart('Shirt', 500)">Add to Cart</button>
        </div>

        <div class="product">
            <h3>Shoes</h3>
            <p>₹1200</p>
            <button onclick="addToCart('Shoes', 1200)">Add to Cart</button>
        </div>

        <div class="product">
            <h3>Watch</h3>
            <p>₹800</p>
            <button onclick="addToCart('Watch', 800)">Add to Cart</button>
        </div>

        <div class="product">
            <h3>Bag</h3>
            <p>₹900</p>
            <button onclick="addToCart('Bag', 900)">Add to Cart</button>
        </div>
    </div>

    <!-- Cart -->
    <h2>Cart</h2>
    <ul id="cart"></ul>

    <h3>Total: ₹<span id="total">0</span></h3>

    <button onclick="placeOrder()">Place Order</button>
    <button onclick="clearCart()">Clear Cart</button>

    <p id="orderMsg"></p>

    <script src="script.js"></script>
</body>
</html>
